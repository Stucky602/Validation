<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CQV Field">
<title>CQV Field Reference</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"CQV Field Reference","short_name":"CQV Field","start_url":"./","display":"standalone","background_color":"#0d1117","theme_color":"#0d1117","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 fill=%22%230d1117%22/%3E%3Crect x=%2236%22 y=%2236%22 width=%22120%22 height=%22120%22 rx=%2218%22 fill=%22none%22 stroke=%22%2358e6a8%22 stroke-width=%228%22/%3E%3Cpath d=%22M64 96 L88 120 L128 72%22 fill=%22none%22 stroke=%22%2358e6a8%22 stroke-width=%2210%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2230;
    --line: #2a3240;
    --ink: #e6edf3;
    --ink-dim: #8b98a9;
    --ink-faint: #5c6776;
    --verified: #58e6a8;
    --flagged: #e8b341;
    --gmp: #6b7689;
    --accent: #58e6a8;
    --iq: #5aa9e6;
    --oq: #c08bf0;
    --pq: #e6885a;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 14px 16px 12px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 {
    font-size: 17px; font-weight: 650; letter-spacing: -0.01em; margin: 0;
  }
  .brand .tag {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-faint);
    border: 1px solid var(--line); border-radius: 4px; padding: 2px 6px;
  }
  .search-wrap { margin-top: 12px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; color: var(--ink); font-size: 16px;
    padding: 11px 12px 11px 38px; font-family: var(--sans);
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

  /* Equipment list */
  main { padding: 12px 16px 80px; max-width: 720px; margin: 0 auto; }
  .domain-filter { display: flex; gap: 8px; margin-bottom: 14px; }
  .domain-filter button {
    flex: 1; background: var(--panel); border: 1px solid var(--line);
    color: var(--ink-dim); font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 7px;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
  }
  .domain-filter button[aria-pressed="true"] { background: var(--panel-2); color: var(--ink); border-color: var(--accent); }

  .eq-card {
    display: flex; align-items: center; gap: 13px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 15px; margin-bottom: 9px;
    cursor: pointer; transition: border-color 0.15s, transform 0.1s;
    text-align: left; width: 100%; font-family: inherit; color: inherit;
  }
  .eq-card:active { transform: scale(0.99); }
  .eq-card:hover { border-color: var(--ink-faint); }
  .eq-icon {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 9px;
    background: var(--panel-2); display: grid; place-items: center;
    border: 1px solid var(--line);
  }
  .eq-meta { flex: 1; min-width: 0; }
  .eq-name { font-size: 15px; font-weight: 600; margin: 0 0 3px; }
  .eq-sub { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 0.02em; }
  .eq-chev { color: var(--ink-faint); flex-shrink: 0; }
  .domain-pill {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
    padding: 2px 5px; border-radius: 4px; text-transform: uppercase;
    border: 1px solid var(--line); color: var(--ink-dim); margin-left: 6px;
  }
  .stub-pill {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
    padding: 2px 5px; border-radius: 4px; text-transform: uppercase;
    border: 1px solid rgba(232,179,65,0.35); color: var(--flagged); margin-left: 6px;
  }
  .eq-card.is-stub { opacity: 0.72; }

  /* Collapsible categories */
  .cat { margin-bottom: 10px; }
  .cat-head {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 11px; padding: 13px 14px; cursor: pointer;
    font-family: inherit; color: var(--ink); text-align: left;
    transition: border-color 0.15s;
  }
  .cat-head:hover { border-color: var(--ink-faint); }
  .cat.open .cat-head { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .cat-twist { display: grid; place-items: center; color: var(--ink-dim); transition: transform 0.18s; flex-shrink: 0; }
  .cat.open .cat-twist { transform: rotate(90deg); color: var(--accent); }
  .cat-label { flex: 1; font-size: 14.5px; font-weight: 620; letter-spacing: -0.01em; }
  .cat-count {
    font-family: var(--mono); font-size: 11px; color: var(--ink-dim);
    background: var(--bg); border: 1px solid var(--line); border-radius: 20px;
    min-width: 22px; text-align: center; padding: 1px 7px;
  }
  .cat-body { display: none; padding: 9px 0 4px; }
  .cat.open .cat-body { display: block; }
  .cat.open .cat-body .eq-card:last-child { margin-bottom: 2px; }
  .empty { text-align: center; color: var(--ink-faint); font-family: var(--mono); font-size: 13px; padding: 50px 20px; }

  /* Detail view */
  .detail { display: none; }
  .detail.active { display: block; }
  .list.hidden { display: none; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--accent);
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;
    cursor: pointer; padding: 6px 0; margin-bottom: 8px;
  }
  .detail-head h2 { font-size: 22px; font-weight: 680; letter-spacing: -0.02em; margin: 2px 0 6px; }
  .detail-head .desc { color: var(--ink-dim); font-size: 13.5px; line-height: 1.5; margin: 0 0 18px; }

  .phase { margin-bottom: 22px; }
  .phase-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .phase-tag {
    font-family: var(--mono); font-weight: 700; font-size: 12px;
    letter-spacing: 0.08em; padding: 4px 9px; border-radius: 6px;
    border: 1px solid; 
  }
  .phase-tag.iq { color: var(--iq); border-color: var(--iq); }
  .phase-tag.oq { color: var(--oq); border-color: var(--oq); }
  .phase-tag.pq { color: var(--pq); border-color: var(--pq); }
  .phase-label { font-size: 12px; color: var(--ink-dim); font-family: var(--mono); letter-spacing: 0.03em; }

  .test-row {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 13px; margin-bottom: 7px;
  }
  .test-txt { flex: 1; font-size: 14px; line-height: 1.45; }
  .source-btn {
    flex-shrink: 0; font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 5px 9px; border-radius: 6px; cursor: pointer;
    border: 1px solid; background: none; transition: all 0.12s;
    display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
    margin-top: 1px;
  }
  .source-btn .dot { width: 6px; height: 6px; border-radius: 50%; }
  .source-btn.verified { color: var(--verified); border-color: rgba(88,230,168,0.4); }
  .source-btn.verified .dot { background: var(--verified); }
  .source-btn.flagged { color: var(--flagged); border-color: rgba(232,179,65,0.4); }
  .source-btn.flagged .dot { background: var(--flagged); }
  .source-btn.gmp { color: var(--gmp); border-color: var(--line); }
  .source-btn.gmp .dot { background: var(--gmp); }
  .source-btn:active { transform: scale(0.95); }

  /* Source sheet */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(2px); z-index: 40; opacity: 0;
    pointer-events: none; transition: opacity 0.2s;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 41;
    background: var(--panel-2); border-top: 1px solid var(--line);
    border-radius: 18px 18px 0 0; padding: 8px 20px calc(28px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.26s cubic-bezier(0.32,0.72,0,1);
    max-width: 720px; margin: 0 auto; max-height: 82vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-grip { width: 38px; height: 4px; background: var(--line); border-radius: 2px; margin: 6px auto 16px; }
  .sheet-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 4px 9px; border-radius: 5px;
    border: 1px solid; margin-bottom: 14px;
  }
  .sheet-status.verified { color: var(--verified); border-color: rgba(88,230,168,0.4); }
  .sheet-status.flagged { color: var(--flagged); border-color: rgba(232,179,65,0.4); }
  .sheet-status.gmp { color: var(--gmp); border-color: var(--line); }
  .sheet-status .dot { width: 7px; height: 7px; border-radius: 50%; }
  .sheet-status.verified .dot { background: var(--verified); }
  .sheet-status.flagged .dot { background: var(--flagged); }
  .sheet-status.gmp .dot { background: var(--gmp); }
  .sheet h3 { font-size: 19px; font-weight: 680; margin: 0 0 3px; font-family: var(--mono); letter-spacing: -0.01em; }
  .sheet .issuer { color: var(--ink-dim); font-size: 13px; margin: 0 0 18px; }
  .sheet-field { margin-bottom: 15px; }
  .sheet-field .k {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-faint); margin-bottom: 5px;
  }
  .sheet-field .v { font-size: 14px; line-height: 1.5; color: var(--ink); }
  .sheet-field .v.crit {
    font-family: var(--mono); font-size: 13px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; line-height: 1.55;
  }
  .sheet-link {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 13px 14px; margin-top: 4px;
    color: var(--accent); text-decoration: none; font-size: 13.5px; font-weight: 550;
  }
  .sheet-link:active { background: var(--bg); }
  .flag-note {
    background: rgba(232,179,65,0.08); border: 1px solid rgba(232,179,65,0.25);
    border-radius: 9px; padding: 11px 12px; font-size: 12.5px; line-height: 1.5;
    color: var(--flagged); margin-bottom: 16px;
  }
  .gmp-note {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 9px; padding: 11px 12px; font-size: 12.5px; line-height: 1.5;
    color: var(--ink-dim); margin-bottom: 4px;
  }
  .install-hint {
    font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
    text-align: center; line-height: 1.6; margin-top: 30px; padding-top: 18px;
    border-top: 1px solid var(--line);
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>CQV Field Reference</h1>
    <span class="tag">IQ · OQ · PQ</span>
  </div>
  <div class="search-wrap list-only">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="search" type="search" placeholder="Search equipment" autocomplete="off" autocapitalize="off" spellcheck="false">
  </div>
</header>

<main>
  <div class="list" id="listView">
    <div class="domain-filter" id="domainFilter">
      <button data-domain="all" aria-pressed="true">All</button>
      <button data-domain="GMP" aria-pressed="false">GMP / USP</button>
      <button data-domain="ISO" aria-pressed="false">ISO / Lab</button>
    </div>
    <div id="eqList"></div>
    <div class="install-hint">
      Add to Home Screen for offline field use.<br>Share → Add to Home Screen.
    </div>
  </div>

  <div class="detail" id="detailView">
    <button class="back-btn" id="backBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      ALL EQUIPMENT
    </button>
    <div class="detail-head">
      <h2 id="dName"></h2>
      <p class="desc" id="dDesc"></p>
    </div>
    <div id="phases"></div>
  </div>
</main>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet"></div>

<script>
/* ---------- DATA ----------
   status: "verified" | "flagged" | "gmp"
   verified  = web-checked against issuing body
   flagged   = seeded from knowledge, confirm before relying
   gmp       = obvious engineering practice, no single clause
*/
const DATA = {
  balance: {
    name: "Balances / Analytical Scales",
    domain: "GMP",
    sub: "Benchtop & large-scale weighing",
    desc: "Qualification of analytical and precision balances used where materials must be accurately weighed. Marquee standards verified against USP.",
    icon: "<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#58e6a8\" stroke-width=\"1.6\"><path d=\"M12 3v18M5 21h14M7 7h10l-2.5 6h-5z\" transform=\"translate(0 -1)\"/><circle cx=\"12\" cy=\"3\" r=\"1.3\"/></svg>",
    phases: {
      IQ: [
        {
          t: "Verify supply voltage and outlet match the nameplate rating before power-on.",
          s: "gmp"
        },
        {
          t: "Confirm installation on a stable, level, vibration-free surface away from drafts and direct airflow.",
          s: {
            status: "verified",
            id: "USP <1251>",
            issuer: "United States Pharmacopeia — Weighing on an Analytical Balance",
            covers: "Informational chapter on the environment, siting, and operation of analytical balances, including draft, vibration, and leveling guidance.",
            crit: "Site away from air currents, vibration, and thermal gradients; balance must be leveled per the bubble indicator before use.",
            link: "https://www.usp.org",
            linkLabel: "usp.org — USP–NF <1251>"
          }
        },
        {
          t: "Confirm built-in level indicator is centered and adjustable feet are functional.",
          s: "gmp"
        },
        {
          t: "Verify calibration weights on hand are traceable (NIST or national standard) with current certificates.",
          s: {
            status: "verified",
            id: "USP <41>",
            issuer: "United States Pharmacopeia — Balances",
            covers: "Mandatory chapter for balances used where substances must be accurately weighed. Defines repeatability and accuracy requirements and permissible test weights.",
            crit: "Test weight must be 5–100% of balance capacity; weight tolerance 0.10% of nominal; measurement uncertainty of the weight ≤ 1/3 of its tolerance; weights traceable to NIST.",
            link: "https://www.usp.org",
            linkLabel: "usp.org — USP–NF <41>"
          }
        },
        {
          t: "Document make, model, serial, capacity, and readability against the purchase specification.",
          s: "gmp"
        },
        {
          t: "Confirm anti-vibration table / draft shield and environmental conditions (temperature, humidity) are suitable.",
          s: "gmp"
        },
        {
          t: "Verify internal calibration function (if motorized) and that the bubble level is installed and visible.",
          s: "gmp"
        },
        {
          t: "Build an instrument inventory: list controlling and recording instruments with cal ID, range, and due date.",
          s: "gmp"
        },
        {
          t: "Verify vendor documentation, manual, and warranty are received and filed.",
          s: "gmp"
        }
      ],
      OQ: [
        {
          t: "Repeatability: weigh one test weight not less than 10 times; compute standard deviation.",
          s: {
            status: "verified",
            id: "USP <41>",
            issuer: "United States Pharmacopeia — Balances",
            covers: "Defines the repeatability test and its acceptance limit for balances in accurate-weighing service.",
            crit: "2 × SD of ≥10 weighings, divided by the smallest net weight intended, must be ≤ 0.10%. If 2×SD < 0.41d (d = scale interval), substitute 0.41d as SD. Test weight need not be calibrated and need not be small.",
            link: "https://www.usp.org",
            linkLabel: "usp.org — USP–NF <41>"
          }
        },
        {
          t: "Accuracy (trueness): weigh a calibrated test weight between 5% and 100% of capacity.",
          s: {
            status: "verified",
            id: "USP <41>",
            issuer: "United States Pharmacopeia — Balances",
            covers: "Defines the accuracy test and acceptance limit.",
            crit: "Reading must be within 0.10% of the calibrated test-weight value. Test weight 5–100% of capacity.",
            link: "https://www.usp.org",
            linkLabel: "usp.org — USP–NF <41>"
          }
        },
        {
          t: "Establish and document the minimum weight / operating range from the repeatability SD.",
          s: {
            status: "verified",
            id: "USP <1251>",
            issuer: "United States Pharmacopeia — Weighing on an Analytical Balance",
            covers: "Theoretical basis and method for determining the operating range and minimum weight from repeatability.",
            crit: "Minimum sample weight = (2 × SD / 0.0010), i.e. the smallest net sample for which 0.10% repeatability holds; add a safety factor per site SOP.",
            link: "https://www.usp.org",
            linkLabel: "usp.org — USP–NF <1251>"
          }
        },
        {
          t: "Verify eccentricity (corner-load): place a weight at center then each quadrant, record deviation.",
          s: {
            status: "verified",
            id: "OIML R76-1 (eccentricity)",
            issuer: "Mettler Toledo routine-testing SOP (per OIML R76-1 / NIST HB 44)",
            covers: "Eccentricity (corner-load) testing is defined in OIML R76-1 and NIST Handbook 44 and detailed in Mettler Toledo's published routine-testing SOP. Method: zero with a weight at center, then read at each of the four corners.",
            crit: "The largest reading (positive or negative) at any of the four corners is the eccentric-load deviation. The acceptance limit is set by the balance's accuracy class and the user's process tolerance (Mettler GWP assigns it per-instrument), not a single fixed figure, so confirm the warning/control limit against your SOP.",
            link: "https://www.mt.com",
            linkLabel: "mt.com — Eccentricity Test SOP"
          }
        },
        {
          t: "Calibration verification: confirm critical instruments are within tolerance before functional testing.",
          s: "gmp"
        },
        {
          t: "Off-center (eccentricity) load test at center and quadrants; record max deviation.",
          s: "gmp"
        },
        {
          t: "Warm-up / drift check: confirm reading stability over the specified stabilization time.",
          s: "gmp"
        },
        {
          t: "Tare and linearity check across the weighing range using reference weights.",
          s: "gmp"
        }
      ],
      PQ: [
        {
          t: "Run routine accuracy/repeatability checks at defined intervals over a representative period under real workload.",
          s: {
            status: "verified",
            id: "USP <1251>",
            issuer: "United States Pharmacopeia — Weighing on an Analytical Balance",
            covers: "<1251> describes routine performance verification (repeatability and sensitivity/accuracy checks) for balances in service, and the minimum-weight concept that bounds the usable range.",
            crit: "Run periodic repeatability and accuracy checks against the same limits as <41>. Check frequency and warning/action limits are risk-based per your SOP; the chapter governs the method, not the interval.",
            link: "https://www.usp.org",
            linkLabel: "usp.org — USP–NF <1251>"
          }
        },
        {
          t: "Confirm daily user check-weighing procedure with a single tolerance weight is in place and trended.",
          s: "gmp"
        },
        {
          t: "Define and document the routine daily check-weighing procedure and tolerance.",
          s: "gmp"
        },
        {
          t: "Confirm performance under actual operating location and workflow over a representative period.",
          s: "gmp"
        }
      ]
    }
  },
  ph: {
    name: "pH Meters",
    domain: "GMP",
    sub: "Potentiometric pH measurement systems",
    desc: "Qualification of potentiometric pH meters and electrodes. Standardization criteria verified against USP <791>.",
    icon: "<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#58e6a8\" stroke-width=\"1.6\"><path d=\"M9 3h6v4l-2 1v9a3 3 0 0 1-6 0V8l2-1z\" transform=\"translate(1 0)\"/><path d=\"M8 13h4\"/></svg>",
    phases: {
      IQ: [
        {
          t: "Verify supply voltage / battery and that meter powers on to a stable display.",
          s: "gmp"
        },
        {
          t: "Confirm electrode, temperature probe (ATC), and buffer set are present and within shelf life.",
          s: "gmp"
        },
        {
          t: "Verify NIST-traceable standardization buffers are on hand with stated accuracy.",
          s: {
            status: "verified",
            id: "USP <791>",
            issuer: "United States Pharmacopeia — pH",
            covers: "Mandatory chapter defining potentiometric pH determination, instrument capability, and buffer requirements.",
            crit: "Commercial buffers standardized by NIST-traceable methods, labeled accurate to 0.01 pH unit (0.02 acceptable below pH 4), may be used.",
            link: "https://www.usp.org",
            linkLabel: "usp.org — USP–NF <791>"
          }
        },
        {
          t: "Record make, model, serial, resolution, and electrode type against specification.",
          s: "gmp"
        },
        {
          t: "Verify electrode storage solution, condition, and that the electrode is within its service life.",
          s: "gmp"

const GMP_INFO = {
  status: "gmp",
  id: "Industry Standard GMP",
  issuer: "General good engineering / GMP practice",
  covers: "A routine good-practice check that supports qualification but does not trace to a single specific compendial or ISO clause. Document it per your site's GMP procedures.",

/* ---------- RENDER ---------- */
const eqList = document.getElementById('eqList');
const listView = document.getElementById('listView');
const detailView = document.getElementById('detailView');
const search = document.getElementById('search');
const domainFilter = document.getElementById('domainFilter');
let activeDomain = 'all';

// Category grouping: section key -> {label, members in display order}
const CATEGORIES = [
  { key: "tcu",        label: "Temperature-Controlled Units (TCUs)", members: ["incubator","co2incubator","fridge","ult","coldroom","warehouse"] },
  { key: "ovens",      label: "Ovens",                                members: ["dryoven","depyrooven","vacuumoven"] },
  { key: "sterilizers",label: "Sterilizers",                          members: ["autoclave"] },
  { key: "cryo",       label: "Cryogenic",                            members: ["ln2","cryochamber"] },
  { key: "analytical", label: "Analytical Instruments",               members: ["balance","ph","osmometer","refractometer"] },
  { key: "lab",        label: "Lab Equipment",                        members: ["centrifuge","waterbath"] },
  { key: "bioreactor", label: "Bioreactors",                          members: ["bioreactor"] },
];
const expandedCats = new Set(); // all collapsed on open

function eqArray() {
  return Object.entries(DATA).map(([id, d]) => ({ id, ...d }));
}

function renderList() {
  const q = search.value.trim().toLowerCase();
  const matches = id => {
    const e = DATA[id]; if (!e) return false;
    const domainOk = activeDomain === 'all' || e.domain === activeDomain;
    const textOk = !q || (e.name + ' ' + e.sub).toLowerCase().includes(q);
    return domainOk && textOk;
  };

  const visibleSections = CATEGORIES
    .map(c => ({ ...c, hits: c.members.filter(matches) }))
    .filter(c => c.hits.length);

  if (!visibleSections.length) {
    eqList.innerHTML = '<div class="empty">No equipment matches.<br>Try a different term.</div>';
    return;
  }

  const searching = q.length > 0;
  eqList.innerHTML = visibleSections.map(c => {
    const open = searching || expandedCats.has(c.key);
    const cards = c.hits.map(id => {
      const e = DATA[id];
      return `<button class="eq-card" onclick="openDetail('${id}')">
        <span class="eq-icon">${e.icon}</span>
        <span class="eq-meta">
          <span class="eq-name">${e.name}<span class="domain-pill">${e.domain}</span></span>
          <span class="eq-sub">${e.sub}</span>
        </span>
        <span class="eq-chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></span>
      </button>`;
    }).join('');
    return `<section class="cat${open ? ' open' : ''}">
      <button class="cat-head" onclick="toggleCat('${c.key}')">
        <span class="cat-twist"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></span>
        <span class="cat-label">${c.label}</span>
        <span class="cat-count">${c.hits.length}</span>
      </button>
      <div class="cat-body">${cards}</div>
    </section>`;
  }).join('');
}

function toggleCat(key) {
  if (expandedCats.has(key)) expandedCats.delete(key); else expandedCats.add(key);
  renderList();
}


const PHASE_LABELS = { IQ: "Installation Qualification", OQ: "Operational Qualification", PQ: "Performance Qualification" };

function openDetail(id) {
  const e = DATA[id];
  document.getElementById('dName').textContent = e.name;
  document.getElementById('dDesc').textContent = e.desc;
  const phasesEl = document.getElementById('phases');
  phasesEl.innerHTML = ['IQ','OQ','PQ'].map(p => {
    const tests = e.phases[p] || [];
    if (!tests.length) return '';
    const rows = tests.map((test, i) => {
      const src = test.s === 'gmp' ? GMP_INFO : test.s;
      const cls = src.status;
      const label = cls === 'verified' ? 'source' : cls === 'flagged' ? 'source' : 'GMP';
      return `<div class="test-row">
        <span class="test-txt">${test.t}</span>
        <button class="source-btn ${cls}" onclick="openSheet('${id}','${p}',${i})">
          <span class="dot"></span>${label}
        </button>
      </div>`;
    }).join('');
    return `<section class="phase">
      <div class="phase-head">
        <span class="phase-tag ${p.toLowerCase()}">${p}</span>
        <span class="phase-label">${PHASE_LABELS[p]}</span>
      </div>${rows}</section>`;
  }).join('');
  listView.classList.add('hidden');
  detailView.classList.add('active');
  document.querySelector('.search-wrap').style.display = 'none';
  window.scrollTo(0,0);
}

function backToList() {
  detailView.classList.remove('active');
  listView.classList.remove('hidden');
  document.querySelector('.search-wrap').style.display = '';
  window.scrollTo(0,0);
}

/* ---------- SOURCE SHEET ---------- */
const sheet = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');

function openSheet(id, phase, i) {
  const test = DATA[id].phases[phase][i];
  const src = test.s === 'gmp' ? GMP_INFO : test.s;
  const isSiteDefined = src.status === 'flagged' && /^Site-defined|^Site protocol|^Site validation|^Physiological/.test(src.id);
  const statusText = src.status === 'verified' ? 'Verified'
    : src.status === 'flagged' ? (isSiteDefined ? 'Site-defined' : 'Confirm before relying')
    : 'Industry Standard GMP';
  let html = `<div class="sheet-grip"></div>
    <span class="sheet-status ${src.status}"><span class="dot"></span>${statusText}</span>
    <h3>${src.id}</h3>
    <p class="issuer">${src.issuer}</p>`;

  if (src.status === 'flagged') {
    html += isSiteDefined
      ? `<div class="flag-note">This value is set by your site, not by a published standard. The URS, risk assessment, or equipment data sheet defines the limit; use this as the check to perform, then fill the acceptance from your own documentation.</div>`
      : `<div class="flag-note">Seeded from general knowledge. Confirm the clause number and acceptance figure against the issuing body before citing it in a protocol.</div>`;
  }
  if (src.status === 'gmp') {
    html += `<div class="gmp-note">${src.covers}</div>`;
  } else {
    html += `<div class="sheet-field"><div class="k">Covers</div><div class="v">${src.covers}</div></div>`;
    if (src.crit) html += `<div class="sheet-field"><div class="k">Acceptance criteria</div><div class="v crit">${src.crit}</div></div>`;
    if (src.link) html += `<a class="sheet-link" href="${src.link}" target="_blank" rel="noopener">${src.linkLabel || 'Find the standard'}<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg></a>`;
  }
  sheet.innerHTML = html;
  backdrop.classList.add('open');
  requestAnimationFrame(() => sheet.classList.add('open'));
}

function closeSheet() {
  sheet.classList.remove('open');
  backdrop.classList.remove('open');
}

backdrop.addEventListener('click', closeSheet);
document.getElementById('backBtn').addEventListener('click', backToList);
search.addEventListener('input', renderList);
domainFilter.addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  activeDomain = b.dataset.domain;
  [...domainFilter.children].forEach(c => c.setAttribute('aria-pressed', c === b));
  renderList();
});

renderList();

/* ---------- OFFLINE: cache self via service worker ---------- */
if ('serviceWorker' in navigator) {
  const swCode = `
    const C = 'cqv-v1';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { self.clients.claim(); });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.open(C).then(cache =>
          cache.match(e.request).then(hit =>
            hit || fetch(e.request).then(res => { cache.put(e.request, res.clone()); return res; })
              .catch(() => hit)
          )
        )
      );
    });`;
  const blob = new Blob([swCode], { type: 'text/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
